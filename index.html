<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>涅槃创新 — 寿县楚文化博物馆</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: #000;
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
  }

  /* ====== Entry Screen (no external resources, instant display) ====== */
  .entry {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: radial-gradient(ellipse at center, #1a1510 0%, #000 70%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: opacity 0.8s;
  }
  .entry.hidden {
    opacity: 0;
    pointer-events: none;
  }
  .entry-title {
    color: rgba(200, 180, 140, 0.9);
    font-size: 28px;
    letter-spacing: 10px;
    margin-bottom: 40px;
    text-shadow: 0 0 30px rgba(100, 200, 180, 0.3);
  }
  .entry-btn {
    color: rgba(200, 180, 140, 0.7);
    font-size: 16px;
    letter-spacing: 4px;
    border: 1px solid rgba(200, 180, 140, 0.3);
    padding: 12px 36px;
    border-radius: 30px;
    animation: pulse 2s ease-in-out infinite;
  }
  .entry-sub {
    color: rgba(200, 180, 140, 0.4);
    font-size: 12px;
    margin-top: 16px;
    letter-spacing: 2px;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.7; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.05); }
  }

  /* ====== Main content ====== */
  .main-content { visibility: hidden; }
  .main-content.active { visibility: visible; }

  .bg {
    position: fixed;
    inset: 0;
    /* CSS gradient fallback while bg.jpg loads */
    background: radial-gradient(ellipse at center, #1a1510 0%, #0a0806 50%, #000 100%);
    opacity: 0;
  }
  .bg.loaded {
    background: url('assets/bg.jpg') center/cover no-repeat;
  }
  .active .bg { animation: fadeIn 1.5s 0.3s forwards; }

  .stage {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 92vmin;
    height: 92vmin;
    z-index: 1;
  }

  .spin-wrapper {
    width: 100%;
    height: 100%;
    position: relative;
  }
  .active .spin-wrapper { animation: slowSpin 30s linear 5s infinite; }

  .layer {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0);
    background-size: contain;
    background-position: center;
    background-repeat: no-repeat;
  }
  .disc { width: 28%; height: 28%; z-index: 3; }
  .active .disc { animation: popIn 1s 1s forwards; }
  .birds { width: 58%; height: 58%; z-index: 2; }
  .active .birds { animation: popIn 1s 2s forwards; }

  .flower {
    position: absolute;
    width: 32%; height: 32%;
    background-size: contain;
    background-position: center;
    background-repeat: no-repeat;
    opacity: 0;
    z-index: 1;
  }
  .flower-top    { top: 50%; left: 50%; transform: translate(-50%,-50%) translateY(-200%); }
  .flower-right  { top: 50%; left: 50%; transform: translate(-50%,-50%) translateX(200%) rotate(90deg); }
  .flower-bottom { top: 50%; left: 50%; transform: translate(-50%,-50%) translateY(200%) rotate(180deg); }
  .flower-left   { top: 50%; left: 50%; transform: translate(-50%,-50%) translateX(-200%) rotate(270deg); }
  .active .flower-top    { animation: flyFromTop 1.2s 3s forwards; }
  .active .flower-right  { animation: flyFromRight 1.2s 3s forwards; }
  .active .flower-bottom { animation: flyFromBottom 1.2s 3s forwards; }
  .active .flower-left   { animation: flyFromLeft 1.2s 3s forwards; }

  /* ====== Posters ====== */
  .poster {
    position: fixed;
    z-index: 5;
    opacity: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 18vmin;
  }
  .poster img {
    width: 100%;
    border-radius: 4px;
    border: 1px solid rgba(200, 180, 140, 0.2);
  }
  .poster .caption {
    color: rgba(200, 180, 140, 0.85);
    font-size: clamp(8px, 1.5vmin, 12px);
    text-align: center;
    letter-spacing: 1px;
    margin-top: 4px;
    line-height: 1.4;
    text-shadow: 0 1px 4px rgba(0,0,0,0.8);
  }
  .poster-tl { top: 6vh; left: 5vw; }
  .poster-tr { top: 6vh; right: 5vw; }
  .poster-bl { bottom: 6vh; left: 5vw; }
  .poster-br { bottom: 6vh; right: 5vw; }
  .active .poster-tl { animation: fadeIn 0.8s 5.5s forwards; }
  .active .poster-tr { animation: fadeIn 0.8s 6s forwards; }
  .active .poster-bl { animation: fadeIn 0.8s 6.5s forwards; }
  .active .poster-br { animation: fadeIn 0.8s 7s forwards; }

  @media (max-aspect-ratio: 3/4) {
    .poster { width: 22vw; }
    .poster-tl { top: 5vh; left: 6vw; }
    .poster-tr { top: 5vh; right: 6vw; }
    .poster-bl { bottom: 5vh; left: 6vw; }
    .poster-br { bottom: 5vh; right: 6vw; }
  }

  .title {
    position: fixed;
    top: 2vh; left: 50%;
    transform: translateX(-50%);
    color: rgba(200, 180, 140, 0.9);
    font-size: 18px;
    letter-spacing: 6px;
    z-index: 10;
    opacity: 0;
    text-shadow: 0 0 20px rgba(100, 200, 180, 0.3);
  }
  .active .title { animation: fadeIn 1.5s 5s forwards; }

  .subtitle {
    position: fixed;
    bottom: 2vh; left: 50%;
    transform: translateX(-50%);
    color: rgba(200, 180, 140, 0.6);
    font-size: 12px;
    letter-spacing: 3px;
    z-index: 10;
    opacity: 0;
    white-space: nowrap;
  }
  .active .subtitle { animation: fadeIn 1.5s 5.5s forwards; }

  .loading-hint {
    position: fixed;
    bottom: 8vh; left: 50%;
    transform: translateX(-50%);
    color: rgba(200, 180, 140, 0.8);
    font-size: 14px;
    letter-spacing: 4px;
    z-index: 20;
    opacity: 0;
  }
  .active .loading-hint { animation: fadeIn 1s 0.5s forwards, fadeOut 1s 4.5s forwards; }

  .music-btn {
    position: fixed;
    bottom: 12px; right: 12px;
    z-index: 50;
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 1px solid rgba(200, 180, 140, 0.4);
    background: rgba(0, 0, 0, 0.5);
    color: rgba(200, 180, 140, 0.8);
    font-size: 18px;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
  }
  .music-btn.show { display: flex; }
  .music-btn.playing { animation: spin 3s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  @keyframes fadeIn { to { opacity: 1; } }
  @keyframes fadeOut { to { opacity: 0; } }
  @keyframes popIn {
    0%   { transform: translate(-50%,-50%) scale(0); opacity: 0; }
    60%  { transform: translate(-50%,-50%) scale(1.08); opacity: 1; }
    100% { transform: translate(-50%,-50%) scale(1); opacity: 1; }
  }
  @keyframes flyFromTop {
    0%   { transform: translate(-50%,-50%) translateY(-200%); opacity: 0; }
    100% { transform: translate(-50%,-50%) translateY(-110%); opacity: 1; }
  }
  @keyframes flyFromRight {
    0%   { transform: translate(-50%,-50%) translateX(200%) rotate(90deg); opacity: 0; }
    100% { transform: translate(-50%,-50%) translateX(110%) rotate(90deg); opacity: 1; }
  }
  @keyframes flyFromBottom {
    0%   { transform: translate(-50%,-50%) translateY(200%) rotate(180deg); opacity: 0; }
    100% { transform: translate(-50%,-50%) translateY(110%) rotate(180deg); opacity: 1; }
  }
  @keyframes flyFromLeft {
    0%   { transform: translate(-50%,-50%) translateX(-200%) rotate(270deg); opacity: 0; }
    100% { transform: translate(-50%,-50%) translateX(-110%) rotate(270deg); opacity: 1; }
  }
  @keyframes slowSpin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
</style>
</head>
<body>

  <!-- Entry screen: pure CSS, no external resources, instant render -->
  <div class="entry" id="entry">
    <div class="entry-title">涅 槃 创 新</div>
    <div class="entry-btn">点 击 进 入</div>
    <div class="entry-sub">寿县楚文化博物馆文创设计</div>
  </div>

  <!-- Main content -->
  <div class="main-content" id="main">
    <div class="bg" id="bg"></div>

    <div class="stage">
      <div class="spin-wrapper">
        <div class="flower flower-top"></div>
        <div class="flower flower-right"></div>
        <div class="flower flower-bottom"></div>
        <div class="flower flower-left"></div>
        <div class="layer birds"></div>
        <div class="layer disc"></div>
      </div>
    </div>

    <div class="poster poster-tl">
      <img data-src="assets/poster1.jpg" alt="巫韵祈天">
      <div class="caption">巫韵祈天 — 巫风浪漫，崇尚自由</div>
    </div>
    <div class="poster poster-tr">
      <img data-src="assets/poster2.jpg" alt="涅槃创新">
      <div class="caption">涅槃创新 — 凤凰涅槃，传承创新</div>
    </div>
    <div class="poster poster-bl">
      <img data-src="assets/poster3.jpg" alt="飨神祈年">
      <div class="caption">飨神祈年 — 祭祀舞韵，通天达地</div>
    </div>
    <div class="poster poster-br">
      <img data-src="assets/poster4.jpg" alt="寿春楚韵">
      <div class="caption">寿春楚韵 — 尚和贵诚，天人合一</div>
    </div>

    <div class="title">涅 槃 创 新</div>
    <div class="subtitle">寿县楚文化博物馆文创设计</div>
    <div class="loading-hint">纹样绽放中...</div>
  </div>

  <button class="music-btn" id="musicBtn" title="音乐开关">♫</button>

  <script>
    var entry = document.getElementById('entry');
    var main = document.getElementById('main');
    var bg = document.getElementById('bg');
    var musicBtn = document.getElementById('musicBtn');
    var playing = false;
    var bgm, narration;

    // ====== Preload strategy: start loading in background immediately ======
    // But don't block anything — entry screen is already visible

    // Background image: preload and apply when ready
    var bgImg = new Image();
    bgImg.onload = function() { bg.classList.add('loaded'); };
    bgImg.src = 'assets/bg.jpg';

    // Core animation images: preload and set as background when ready
    var layerMap = {
      'assets/disc.webp': '.disc',
      'assets/birds.webp': '.birds',
      'assets/flower.webp': '.flower'
    };
    Object.keys(layerMap).forEach(function(src) {
      var img = new Image();
      img.onload = function() {
        var els = document.querySelectorAll(layerMap[src]);
        for (var i = 0; i < els.length; i++) {
          els[i].style.backgroundImage = "url('" + src + "')";
        }
      };
      img.src = src;
    });

    // ====== Entry click — no waiting ======
    var entered = false;
    function enterMain() {
      if (entered) return;
      entered = true;

      entry.classList.add('hidden');
      main.classList.add('active');
      musicBtn.classList.add('show');

      // Create audio elements on demand (saves initial load time)
      bgm = new Audio('assets/bgm.mp3');
      bgm.loop = true;
      bgm.volume = 0.35;
      bgm.play().then(function() {
        playing = true;
        musicBtn.classList.add('playing');
      }).catch(function() {
        setTimeout(function() {
          bgm.play().then(function() {
            playing = true;
            musicBtn.classList.add('playing');
          }).catch(function() {});
        }, 500);
      });

      // Narration after 1.5s
      setTimeout(function() {
        narration = new Audio('assets/narration.mp3');
        narration.volume = 0.9;
        narration.play().catch(function() {});
      }, 1500);

      // Lazy load posters (they appear at 5.5s+ anyway)
      setTimeout(function() {
        var imgs = document.querySelectorAll('.poster img[data-src]');
        for (var i = 0; i < imgs.length; i++) {
          imgs[i].src = imgs[i].getAttribute('data-src');
        }
      }, 2000);

      setTimeout(function() { entry.style.display = 'none'; }, 800);
    }

    entry.addEventListener('click', enterMain);
    entry.addEventListener('touchend', function(e) {
      e.preventDefault();
      enterMain();
    });

    // ====== Music toggle ======
    musicBtn.addEventListener('click', function() {
      if (!bgm) return;
      if (playing) {
        bgm.pause();
        if (narration) narration.pause();
        playing = false;
        musicBtn.classList.remove('playing');
        musicBtn.textContent = '\u266A';
      } else {
        bgm.play();
        if (narration && narration.currentTime < narration.duration) {
          narration.play().catch(function() {});
        }
        playing = true;
        musicBtn.classList.add('playing');
        musicBtn.textContent = '\u266B';
      }
    });
  </script>

</body>
</html>
