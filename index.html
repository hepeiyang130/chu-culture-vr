<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>涅槃创新 — 寿县楚文化博物馆</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* -- Background -- */
  .bg {
    position: fixed;
    inset: 0;
    background: url('assets/bg.jpg') center/cover no-repeat;
    opacity: 0;
    animation: fadeIn 1.5s 0.3s forwards;
  }

  /* -- Stage: fixed square, same on all devices -- */
  .stage {
    position: relative;
    width: 92vmin;
    height: 92vmin;
    z-index: 1;
  }

  /* -- Spin wrapper -- */
  .spin-wrapper {
    width: 100%;
    height: 100%;
    position: relative;
    animation: slowSpin 30s linear 5s infinite;
  }

  /* -- Layer 1: Center disc (smallest, appears first) -- */
  .disc {
    position: absolute;
    width: 28%;
    height: 28%;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0);
    background: url('assets/disc.png') center/contain no-repeat;
    animation: popIn 1s 1s forwards;
    z-index: 3;
  }

  /* -- Layer 2: Bird ring (medium, appears second) -- */
  .birds {
    position: absolute;
    width: 58%;
    height: 58%;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0);
    background: url('assets/birds.png') center/contain no-repeat;
    animation: popIn 1s 2s forwards;
    z-index: 2;
  }

  /* -- Layer 3: Four flowers (largest, appears last, equal size/distance) -- */
  .flower {
    position: absolute;
    width: 32%;
    height: 32%;
    background: url('assets/flower.png') center/contain no-repeat;
    opacity: 0;
    z-index: 1;
  }

  .flower-top {
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) translateY(-200%) rotate(0deg);
    animation: flyFromTop 1.2s 3s forwards;
  }

  .flower-right {
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) translateX(200%) rotate(90deg);
    animation: flyFromRight 1.2s 3s forwards;
  }

  .flower-bottom {
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) translateY(200%) rotate(180deg);
    animation: flyFromBottom 1.2s 3s forwards;
  }

  .flower-left {
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) translateX(-200%) rotate(270deg);
    animation: flyFromLeft 1.2s 3s forwards;
  }

  /* -- Text -- */
  .loading-hint {
    position: fixed;
    bottom: 8vh;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(200, 180, 140, 0.8);
    font-size: 14px;
    letter-spacing: 4px;
    z-index: 10;
    animation: fadeIn 1s 0.5s forwards, fadeOut 1s 4.5s forwards;
    opacity: 0;
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
  }

  .title {
    position: fixed;
    top: 4vh;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(200, 180, 140, 0.9);
    font-size: 18px;
    letter-spacing: 6px;
    z-index: 10;
    opacity: 0;
    animation: fadeIn 1.5s 5s forwards;
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    text-shadow: 0 0 20px rgba(100, 200, 180, 0.3);
  }

  .subtitle {
    position: fixed;
    bottom: 4vh;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(200, 180, 140, 0.6);
    font-size: 12px;
    letter-spacing: 3px;
    z-index: 10;
    opacity: 0;
    animation: fadeIn 1.5s 5.5s forwards;
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    white-space: nowrap;
  }

  /* ====== Keyframes ====== */

  @keyframes fadeIn {
    to { opacity: 1; }
  }

  @keyframes fadeOut {
    to { opacity: 0; }
  }

  @keyframes popIn {
    0%   { transform: translate(-50%, -50%) scale(0); opacity: 0; }
    60%  { transform: translate(-50%, -50%) scale(1.08); opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
  }

  @keyframes flyFromTop {
    0%   { transform: translate(-50%, -50%) translateY(-200%) rotate(0deg); opacity: 0; }
    100% { transform: translate(-50%, -50%) translateY(-110%) rotate(0deg); opacity: 1; }
  }

  @keyframes flyFromRight {
    0%   { transform: translate(-50%, -50%) translateX(200%) rotate(90deg); opacity: 0; }
    100% { transform: translate(-50%, -50%) translateX(110%) rotate(90deg); opacity: 1; }
  }

  @keyframes flyFromBottom {
    0%   { transform: translate(-50%, -50%) translateY(200%) rotate(180deg); opacity: 0; }
    100% { transform: translate(-50%, -50%) translateY(110%) rotate(180deg); opacity: 1; }
  }

  @keyframes flyFromLeft {
    0%   { transform: translate(-50%, -50%) translateX(-200%) rotate(270deg); opacity: 0; }
    100% { transform: translate(-50%, -50%) translateX(-110%) rotate(270deg); opacity: 1; }
  }

  @keyframes slowSpin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
</style>
</head>
<body>

  <!-- Background layer -->
  <div class="bg"></div>

  <!-- Animation stage -->
  <div class="stage">
    <div class="spin-wrapper">
      <!-- Layer 3: Four flowers (outermost, last to appear) -->
      <div class="flower flower-top"></div>
      <div class="flower flower-right"></div>
      <div class="flower flower-bottom"></div>
      <div class="flower flower-left"></div>

      <!-- Layer 2: Bird ring (middle) -->
      <div class="birds"></div>

      <!-- Layer 1: Center disc (smallest, first to appear) -->
      <div class="disc"></div>
    </div>
  </div>

  <!-- Text overlays -->
  <div class="loading-hint">纹样绽放中...</div>
  <div class="title">涅 槃 创 新</div>
  <div class="subtitle">寿县楚文化博物馆文创设计</div>

</body>
</html>
