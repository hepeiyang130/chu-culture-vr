<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>涅槃创新 — 寿县楚文化博物馆</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: #000;
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
  }

  /* ====== Entry Screen ====== */
  .entry {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: opacity 1s;
  }
  .entry.hidden {
    opacity: 0;
    pointer-events: none;
  }
  .entry-title {
    color: rgba(200, 180, 140, 0.9);
    font-size: 28px;
    letter-spacing: 10px;
    margin-bottom: 40px;
    text-shadow: 0 0 30px rgba(100, 200, 180, 0.3);
  }
  .entry-btn {
    color: rgba(200, 180, 140, 0.7);
    font-size: 16px;
    letter-spacing: 4px;
    border: 1px solid rgba(200, 180, 140, 0.3);
    padding: 12px 36px;
    border-radius: 30px;
    animation: pulse 2s ease-in-out infinite;
  }
  .entry-sub {
    color: rgba(200, 180, 140, 0.4);
    font-size: 12px;
    margin-top: 16px;
    letter-spacing: 2px;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.7; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.05); }
  }

  /* ====== Main content (paused until entry click) ====== */
  .main-content { visibility: hidden; }
  .main-content.active { visibility: visible; }

  /* -- Background -- */
  .bg {
    position: fixed;
    inset: 0;
    background: url('assets/bg.jpg') center/cover no-repeat;
    opacity: 0;
  }
  .active .bg { animation: fadeIn 1.5s 0.3s forwards; }

  /* -- Stage -- */
  .stage {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 92vmin;
    height: 92vmin;
    z-index: 1;
  }

  .spin-wrapper {
    width: 100%;
    height: 100%;
    position: relative;
  }
  .active .spin-wrapper { animation: slowSpin 30s linear 5s infinite; }

  .disc {
    position: absolute;
    width: 28%; height: 28%;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0);
    background: url('assets/disc.png') center/contain no-repeat;
    z-index: 3;
  }
  .active .disc { animation: popIn 1s 1s forwards; }

  .birds {
    position: absolute;
    width: 58%; height: 58%;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0);
    background: url('assets/birds.png') center/contain no-repeat;
    z-index: 2;
  }
  .active .birds { animation: popIn 1s 2s forwards; }

  .flower {
    position: absolute;
    width: 32%; height: 32%;
    background: url('assets/flower.png') center/contain no-repeat;
    opacity: 0;
    z-index: 1;
  }
  .flower-top {
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) translateY(-200%) rotate(0deg);
  }
  .flower-right {
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) translateX(200%) rotate(90deg);
  }
  .flower-bottom {
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) translateY(200%) rotate(180deg);
  }
  .flower-left {
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) translateX(-200%) rotate(270deg);
  }
  .active .flower-top { animation: flyFromTop 1.2s 3s forwards; }
  .active .flower-right { animation: flyFromRight 1.2s 3s forwards; }
  .active .flower-bottom { animation: flyFromBottom 1.2s 3s forwards; }
  .active .flower-left { animation: flyFromLeft 1.2s 3s forwards; }

  /* ====== Four corner posters ====== */
  .poster {
    position: fixed;
    z-index: 5;
    opacity: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .poster img {
    width: 100%;
    border-radius: 4px;
    border: 1px solid rgba(200, 180, 140, 0.2);
  }
  .poster .caption {
    color: rgba(200, 180, 140, 0.85);
    font-size: clamp(8px, 1.5vmin, 12px);
    text-align: center;
    letter-spacing: 1px;
    margin-top: 4px;
    line-height: 1.4;
    text-shadow: 0 1px 4px rgba(0,0,0,0.8);
  }
  .poster { width: 18vmin; }

  .poster-tl { top: 6vh; left: 5vw; }
  .poster-tr { top: 6vh; right: 5vw; }
  .poster-bl { bottom: 6vh; left: 5vw; }
  .poster-br { bottom: 6vh; right: 5vw; }

  .active .poster-tl { animation: fadeIn 0.8s 5.5s forwards; }
  .active .poster-tr { animation: fadeIn 0.8s 6s forwards; }
  .active .poster-bl { animation: fadeIn 0.8s 6.5s forwards; }
  .active .poster-br { animation: fadeIn 0.8s 7s forwards; }

  @media (max-aspect-ratio: 3/4) {
    .poster { width: 22vw; }
    .poster-tl { top: 5vh; left: 6vw; }
    .poster-tr { top: 5vh; right: 6vw; }
    .poster-bl { bottom: 5vh; left: 6vw; }
    .poster-br { bottom: 5vh; right: 6vw; }
  }

  /* -- Text overlays -- */
  .title {
    position: fixed;
    top: 2vh; left: 50%;
    transform: translateX(-50%);
    color: rgba(200, 180, 140, 0.9);
    font-size: 18px;
    letter-spacing: 6px;
    z-index: 10;
    opacity: 0;
    text-shadow: 0 0 20px rgba(100, 200, 180, 0.3);
  }
  .active .title { animation: fadeIn 1.5s 5s forwards; }

  .subtitle {
    position: fixed;
    bottom: 2vh; left: 50%;
    transform: translateX(-50%);
    color: rgba(200, 180, 140, 0.6);
    font-size: 12px;
    letter-spacing: 3px;
    z-index: 10;
    opacity: 0;
    white-space: nowrap;
  }
  .active .subtitle { animation: fadeIn 1.5s 5.5s forwards; }

  .loading-hint {
    position: fixed;
    bottom: 8vh; left: 50%;
    transform: translateX(-50%);
    color: rgba(200, 180, 140, 0.8);
    font-size: 14px;
    letter-spacing: 4px;
    z-index: 20;
    opacity: 0;
  }
  .active .loading-hint { animation: fadeIn 1s 0.5s forwards, fadeOut 1s 4.5s forwards; }

  /* -- Music button -- */
  .music-btn {
    position: fixed;
    bottom: 12px; right: 12px;
    z-index: 50;
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 1px solid rgba(200, 180, 140, 0.4);
    background: rgba(0, 0, 0, 0.5);
    color: rgba(200, 180, 140, 0.8);
    font-size: 18px;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
  }
  .music-btn.show { display: flex; }
  .music-btn.playing { animation: spin 3s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ====== Keyframes ====== */
  @keyframes fadeIn { to { opacity: 1; } }
  @keyframes fadeOut { to { opacity: 0; } }
  @keyframes popIn {
    0%   { transform: translate(-50%, -50%) scale(0); opacity: 0; }
    60%  { transform: translate(-50%, -50%) scale(1.08); opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
  }
  @keyframes flyFromTop {
    0%   { transform: translate(-50%, -50%) translateY(-200%) rotate(0deg); opacity: 0; }
    100% { transform: translate(-50%, -50%) translateY(-110%) rotate(0deg); opacity: 1; }
  }
  @keyframes flyFromRight {
    0%   { transform: translate(-50%, -50%) translateX(200%) rotate(90deg); opacity: 0; }
    100% { transform: translate(-50%, -50%) translateX(110%) rotate(90deg); opacity: 1; }
  }
  @keyframes flyFromBottom {
    0%   { transform: translate(-50%, -50%) translateY(200%) rotate(180deg); opacity: 0; }
    100% { transform: translate(-50%, -50%) translateY(110%) rotate(180deg); opacity: 1; }
  }
  @keyframes flyFromLeft {
    0%   { transform: translate(-50%, -50%) translateX(-200%) rotate(270deg); opacity: 0; }
    100% { transform: translate(-50%, -50%) translateX(-110%) rotate(270deg); opacity: 1; }
  }
  @keyframes slowSpin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
</style>
</head>
<body>

  <!-- Entry screen -->
  <div class="entry" id="entry">
    <div class="entry-title">涅 槃 创 新</div>
    <div class="entry-btn">点 击 进 入</div>
    <div class="entry-sub">寿县楚文化博物馆文创设计</div>
  </div>

  <!-- Main content -->
  <div class="main-content" id="main">
    <div class="bg"></div>

    <div class="stage">
      <div class="spin-wrapper">
        <div class="flower flower-top"></div>
        <div class="flower flower-right"></div>
        <div class="flower flower-bottom"></div>
        <div class="flower flower-left"></div>
        <div class="birds"></div>
        <div class="disc"></div>
      </div>
    </div>

    <div class="poster poster-tl">
      <img src="assets/poster1.jpg" alt="巫韵祈天">
      <div class="caption">巫韵祈天 — 巫风浪漫，崇尚自由</div>
    </div>
    <div class="poster poster-tr">
      <img src="assets/poster2.jpg" alt="涅槃创新">
      <div class="caption">涅槃创新 — 凤凰涅槃，传承创新</div>
    </div>
    <div class="poster poster-bl">
      <img src="assets/poster3.jpg" alt="飨神祈年">
      <div class="caption">飨神祈年 — 祭祀舞韵，通天达地</div>
    </div>
    <div class="poster poster-br">
      <img src="assets/poster4.jpg" alt="寿春楚韵">
      <div class="caption">寿春楚韵 — 尚和贵诚，天人合一</div>
    </div>

    <div class="title">涅 槃 创 新</div>
    <div class="subtitle">寿县楚文化博物馆文创设计</div>
    <div class="loading-hint">纹样绽放中...</div>
  </div>

  <!-- Music toggle button -->
  <button class="music-btn" id="musicBtn" title="音乐开关">♫</button>

  <!-- Audio -->
  <audio id="bgm" loop preload="auto">
    <source src="assets/bgm.mp3" type="audio/mpeg">
  </audio>

  <script>
    const entry = document.getElementById('entry');
    const main = document.getElementById('main');
    const bgm = document.getElementById('bgm');
    const musicBtn = document.getElementById('musicBtn');
    let playing = false;

    // Unlock audio on mobile (needs user gesture)
    function unlockAudio() {
      bgm.load();
      bgm.volume = 0.4;
      const p = bgm.play();
      if (p) {
        p.then(() => {
          playing = true;
          musicBtn.classList.add('playing');
        }).catch(() => {
          // Retry after a short delay
          setTimeout(() => {
            bgm.play().then(() => {
              playing = true;
              musicBtn.classList.add('playing');
            }).catch(() => {});
          }, 500);
        });
      }
    }

    entry.addEventListener('click', () => {
      entry.classList.add('hidden');
      main.classList.add('active');
      musicBtn.classList.add('show');
      unlockAudio();
      setTimeout(() => { entry.style.display = 'none'; }, 1000);
    });

    // Also handle touch for mobile
    entry.addEventListener('touchend', (e) => {
      e.preventDefault();
      entry.click();
    });

    musicBtn.addEventListener('click', () => {
      if (playing) {
        bgm.pause();
        playing = false;
        musicBtn.classList.remove('playing');
        musicBtn.textContent = '♪';
      } else {
        bgm.play();
        playing = true;
        musicBtn.classList.add('playing');
        musicBtn.textContent = '♫';
      }
    });
  </script>

</body>
</html>
